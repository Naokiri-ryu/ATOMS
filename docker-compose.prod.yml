services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      ATOMS_DOMAIN: ${ATOMS_DOMAIN:-atoms.localhost}
      SAKTI_DOMAIN: ${SAKTI_DOMAIN:-sakti.localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - atoms-frontend
      - atoms-backend
      - sakti
    networks:
      - teknik_prod

  atoms-frontend:
    build:
      context: ./atoms/frontend_atoms
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${ATOMS_PUBLIC_API_URL:-/api}
        VITE_SAKTI_URL: ${SAKTI_PUBLIC_URL:-https://sakti.localhost}
    restart: unless-stopped
    depends_on:
      - atoms-backend
    networks:
      - teknik_prod

  atoms-backend:
    build:
      context: ./atoms/backend_atoms
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_NAME: ATOMS
      APP_ENV: production
      APP_KEY: ${ATOMS_APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${ATOMS_PUBLIC_URL:-https://atoms.localhost}
      APP_FRONTEND_URL: ${ATOMS_PUBLIC_URL:-https://atoms.localhost}
      CORS_ALLOWED_ORIGINS: ${ATOMS_CORS_ALLOWED_ORIGINS:-https://atoms.localhost}
      DB_CONNECTION: pgsql
      DB_HOST: atoms-db
      DB_PORT: 5432
      DB_DATABASE: ${ATOMS_DB_DATABASE:-atoms}
      DB_USERNAME: ${ATOMS_DB_USERNAME:-atoms}
      DB_PASSWORD: ${ATOMS_DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      MAIL_MAILER: log
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - atoms_storage_data:/var/www/html/storage/app/public
      - atoms_logs_data:/var/www/html/storage/logs
    depends_on:
      atoms-db:
        condition: service_healthy
    networks:
      - teknik_prod

  atoms-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ATOMS_DB_DATABASE:-atoms}
      POSTGRES_USER: ${ATOMS_DB_USERNAME:-atoms}
      POSTGRES_PASSWORD: ${ATOMS_DB_PASSWORD}
    volumes:
      - atoms_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ATOMS_DB_USERNAME:-atoms} -d ${ATOMS_DB_DATABASE:-atoms}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - teknik_prod

  sakti:
    build:
      context: ./sakti
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    environment:
      APP_NAME: SAKTI
      APP_ENV: production
      APP_KEY: ${SAKTI_APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${SAKTI_PUBLIC_URL:-https://sakti.localhost}
      DB_CONNECTION: pgsql
      DB_HOST: sakti-db
      DB_PORT: 5432
      DB_DATABASE: ${SAKTI_DB_DATABASE:-sakti}
      DB_USERNAME: ${SAKTI_DB_USERNAME:-sakti}
      DB_PASSWORD: ${SAKTI_DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
    volumes:
      - sakti_storage_data:/var/www/html/storage/app/public
      - sakti_logs_data:/var/www/html/storage/logs
    depends_on:
      sakti-db:
        condition: service_healthy
    networks:
      - teknik_prod

  sakti-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SAKTI_DB_DATABASE:-sakti}
      POSTGRES_USER: ${SAKTI_DB_USERNAME:-sakti}
      POSTGRES_PASSWORD: ${SAKTI_DB_PASSWORD}
    volumes:
      - sakti_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SAKTI_DB_USERNAME:-sakti} -d ${SAKTI_DB_DATABASE:-sakti}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - teknik_prod

volumes:
  caddy_data:
  caddy_config:
  atoms_db_data:
  atoms_storage_data:
  atoms_logs_data:
  sakti_db_data:
  sakti_storage_data:
  sakti_logs_data:

networks:
  teknik_prod:
    driver: bridge
